<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>الإخوة ستور — تسجيل الدخول</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  body{
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .login-wrap{
    width: 100%;
    max-width: 380px;
  }
  .login-brand{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
    text-align: center;
  }
  .login-mark{
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: linear-gradient(160deg, var(--gold), #B5822F);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 22px;
    color: #1A1305;
  }
  .login-brand h1{
    font-family: var(--font-display);
    font-size: 24px;
    margin: 0;
  }
  .login-brand p{
    color: var(--text-muted);
    font-size: 13px;
    margin: 0;
  }
  .login-card{
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-l);
    padding: 26px;
    box-shadow: var(--shadow-card);
  }
  .login-field label{
    display: block;
    font-size: 12.5px;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .login-field input{
    width: 100%;
    background: var(--surface-raised);
    border: 1px solid var(--border);
    color: var(--text-primary);
    border-radius: var(--radius-s);
    padding: 12px 14px;
    font-size: 14px;
    direction: ltr;
    text-align: right;
    font-family: var(--font-body);
  }
  .login-field input:focus{ border-color: var(--gold); }
  .login-submit{
    width: 100%;
    margin-top: 16px;
    padding: 12px;
    border-radius: var(--radius-s);
    border: none;
    background: linear-gradient(160deg, var(--gold), #B5822F);
    color: #1A1305;
    font-weight: 700;
    font-size: 14.5px;
    cursor: pointer;
  }
  .login-submit:hover{ filter: brightness(1.06); }
  .login-msg{
    margin-top: 14px;
    font-size: 13px;
    text-align: center;
    display: none;
  }
  .login-msg.show{ display: block; }
  .login-msg.error{ color: var(--expense); }
  .login-note{
    margin-top: 20px;
    text-align: center;
    font-size: 12px;
    color: var(--text-faint);
    line-height: 1.7;
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-brand">
    <div class="login-mark">إ</div>
    <h1>الإخوة ستور</h1>
    <p>نظام حسابات المحل — الإكسسوارات · التلفونات · الصيانة</p>
  </div>

  <div class="login-card">
    <form id="loginForm">
      <div class="login-field">
        <label for="email">البريد الإلكتروني المصرح له</label>
        <input type="email" id="email" name="email" placeholder="name@example.com" required autocomplete="email">
      </div>
      <button type="submit" class="login-submit">دخول</button>
      <p id="loginMsg" class="login-msg error">هذا البريد غير مضاف إلى النظام. راجع صاحب الحساب لإضافته.</p>
    </form>
    <p class="login-note">
      الدخول مقتصر على البريد المضاف مسبقًا من إدارة المحل فقط.
      لا يوجد تسجيل مفتوح، لأن هذا نظام محاسبي داخلي.
    </p>
  </div>
</div>

<script src="assets/app.js"></script>
<script>
  // التحقق الآن فعلي عبر الخادم (GAS) بدل القائمة المحلية.
  const form = document.getElementById("loginForm");
  const msg = document.getElementById("loginMsg");
  const submitBtn = form.querySelector(".login-submit");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim().toLowerCase();
    if(!email) return;

    msg.classList.remove("show");
    submitBtn.disabled = true;
    submitBtn.textContent = "جاري التحقق...";

    const result = await checkEmailOnServer(email);

    submitBtn.disabled = false;
    submitBtn.textContent = "دخول";

    if(!result.ok){
      msg.textContent = result.error || "تعذّر الاتصال بالخادم، حاول مرة أخرى";
      msg.classList.add("show");
      return;
    }

    if(!result.allowed){
      msg.textContent = "هذا البريد غير مضاف إلى النظام. راجع صاحب الحساب لإضافته.";
      msg.classList.add("show");
      return;
    }

    window.location.href = `dashboard.html?email=${encodeURIComponent(email)}`;
  });
</script>
</body>
</html>
