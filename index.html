<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>الإخوة ستور — تسجيل الدخول</title>
<link rel="stylesheet" href="assets/style.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  body{
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .login-wrap{
    width: 100%;
    max-width: 380px;
  }
  .login-brand{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
    text-align: center;
  }
  .login-mark{
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: linear-gradient(160deg, var(--gold), #B5822F);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 22px;
    color: #1A1305;
  }
  .login-brand h1{
    font-family: var(--font-display);
    font-size: 24px;
    margin: 0;
  }
  .login-brand p{
    color: var(--text-muted);
    font-size: 13px;
    margin: 0;
  }
  .login-card{
    background: var(--surface);
    border: 1px solid var(--border-soft);
    border-radius: var(--radius-l);
    padding: 26px;
    box-shadow: var(--shadow-card);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  #googleBtnMount{
    display: flex;
    justify-content: center;
    min-height: 44px;
  }
  .login-status{
    font-size: 13px;
    text-align: center;
    display: none;
    width: 100%;
  }
  .login-status.show{ display: block; }
  .login-status.error{ color: var(--expense); }
  .login-status.pending{ color: var(--text-muted); }
  .login-note{
    text-align: center;
    font-size: 12px;
    color: var(--text-faint);
    line-height: 1.7;
    margin: 0;
  }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-brand">
    <div class="login-mark">إ</div>
    <h1>الإخوة ستور</h1>
    <p>نظام حسابات المحل — الإكسسوارات · التلفونات · الصيانة</p>
  </div>

  <div class="login-card">
    <div id="googleBtnMount"></div>
    <p id="loginStatus" class="login-status"></p>
    <p class="login-note">
      الدخول مقتصر على حساب جوجل المضاف مسبقًا من إدارة المحل فقط.
      يتم التحقق من هوية الحساب فعليًا مع جوجل، وليس مجرد كتابة البريد.
    </p>
  </div>
</div>

<script src="assets/app.js"></script>
<script>
  const statusEl = document.getElementById("loginStatus");

  function showStatus(kind, text){
    statusEl.className = `login-status show ${kind}`;
    statusEl.textContent = text;
  }

  async function handleCredentialResponse(response){
    showStatus("pending", "جاري التحقق من الحساب...");

    const result = await callServer("googleLogin", { idToken: response.credential });

    if(!result.ok){
      showStatus("error", result.error || "تعذّر تسجيل الدخول، حاول مرة أخرى");
      return;
    }

    if(!result.allowed){
      showStatus("error", "هذا الحساب غير مضاف إلى النظام. راجع صاحب الحساب لإضافته.");
      return;
    }

    saveSession(result.email, result.token);
    window.location.href = "dashboard.html";
  }

  window.onload = function(){
    google.accounts.id.initialize({
      client_id: "939597575297-0rdc1salhlgedlcruhpifmjoqkcpmcec.apps.googleusercontent.com",
      callback: handleCredentialResponse
    });
    google.accounts.id.renderButton(
      document.getElementById("googleBtnMount"),
      { theme: "filled_black", size: "large", text: "signin_with", shape: "pill", locale: "ar" }
    );
  };
</script>
</body>
</html>
